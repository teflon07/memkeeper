name: release

# Tag a release to build and publish binaries:
#   git tag v0.2.1 && git push origin v0.2.1
#
# Builds the `memkeeper` binary for macOS (Apple Silicon) and Linux x86_64.
# (Windows is not yet published — its build is unverified; see the README/debt.)
# Built `--features semantic,api`: the ONNX runtime is statically bundled, so the
# release binary is self-contained (no system onnxruntime) and fully on-device
# semantic-capable with no rebuild. The models themselves are not bundled —
# `memkeeper pull-models` fetches them on first use, and the binary serves lexical
# BM25/FTS until then. `api` additionally allows off-device embeddings via an
# OpenAI-compatible endpoint. Archives are attached to a GitHub Release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable, pinned
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build
        run: cargo build --release --no-default-features --features semantic,api --bin memkeeper --target ${{ matrix.target }}
      - name: Smoke test
        # `bash` runs with `-eo pipefail`, so any non-zero exit fails the job.
        # Exercises the core path with no models pulled: semantic is compiled in
        # but the binary serves lexical (BM25/FTS) until `pull-models` runs.
        run: |
          bin="target/${{ matrix.target }}/release/memkeeper"
          store="${RUNNER_TEMP:-/tmp}/memkeeper-smoke.sqlite"
          rm -f "$store"
          "$bin" init --store "$store" --json
          "$bin" remember --store "$store" --json '{"content":"memkeeper smoke test memory"}'
          "$bin" search --store "$store" --json '{"query":"smoke test","limit":1}'
      - name: Package
        run: |
          staging="memkeeper-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/memkeeper" "$staging/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          shasum -a 256 "$staging.tar.gz" > "$staging.tar.gz.sha256"
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            memkeeper-*.tar.gz
            memkeeper-*.tar.gz.sha256
