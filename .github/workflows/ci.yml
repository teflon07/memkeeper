name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable, pinned
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      # The CLI ships in non-default feature configs too; lint them so a
      # config-specific warning can't go latent (CI default-features clippy
      # would miss it). Lexical = `--no-default-features`; off-device = `api`.
      - name: Clippy (lexical)
        run: cargo clippy -p memkeeper-cli --no-default-features --all-targets -- -D warnings
      - name: Clippy (off-device api)
        run: cargo clippy -p memkeeper-cli --no-default-features --features api --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace

  windows-build:
    # Windows is experimental (build-from-source only, no published binary). This
    # job guards the non-Unix `#[cfg(not(unix))]` paths from silently breaking —
    # they don't compile on the Unix dev boxes or the other CI jobs. Build + smoke
    # only; the full test suite includes Unix-socket tests that don't apply here.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable, pinned
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build (off-device api config)
        run: cargo build --release --no-default-features --features api --bin memkeeper -p memkeeper-cli
      - name: Smoke test
        shell: bash
        run: |
          bin="target/release/memkeeper.exe"
          store="${RUNNER_TEMP:-/tmp}/memkeeper-smoke.sqlite"
          rm -f "$store"
          "$bin" init     --store "$store" --json
          "$bin" remember --store "$store" --json '{"content":"windows ci smoke test"}'
          "$bin" search   --store "$store" --json '{"query":"smoke","limit":1}'

  leak-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: No secrets or absolute home paths
        run: |
          # Generic leak indicators only — absolute home paths and private keys.
          # Project-specific scrubbing (stale brand, maintainer identity) runs in
          # the maintainer's private publish tooling before anything is pushed
          # here; enumerating those identifiers in this public file would itself
          # disclose them.
          # The /[U]sers/ character class matches a real macOS home path without
          # the pattern text containing that literal string, so this job never
          # matches its own definition (and neither does the maintainer's private
          # pre-publish guard).
          if grep -rniE '/[U]sers/|/home/[a-z][a-z0-9._-]+/|BEGIN [A-Z ]*PRIVATE KEY|AKIA[0-9A-Z]{16}' \
               --exclude-dir=.git --exclude-dir=target .; then
            echo "::error::leak guard found a secret or absolute home path"
            exit 1
          fi
          echo "leak guard clean"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable, pinned
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies for security advisories
        # Fails on known vulnerabilities; unmaintained/yanked crates are reported
        # as warnings only (non-blocking). Tune with an audit.toml if needed.
        run: cargo audit
